<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 外圈光环 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gradient)" stroke-width="8"/>
  <!-- 内圈 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#gradient)" stroke-width="4" opacity="0.6"/>
  <!-- 中心闪电图标 -->
  <path d="M105 30 L65 100 L95 100 L80 170 L130 90 L100 90 L115 30 Z" fill="url(#gradient)"/>
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
</svg>
