<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 中心立方体 - 等轴测 -->
  <g transform="translate(100, 100)">
    <!-- 顶面 -->
    <path d="M0 -50 L45 -25 L0 0 L-45 -25 Z" fill="none" stroke="url(#grad1)" stroke-width="2.5" />
    <!-- 右面 -->
    <path d="M45 -25 L45 25 L0 50 L0 0 Z" fill="none" stroke="url(#grad1)" stroke-width="2.5" />
    <!-- 左面 -->
    <path d="M-45 -25 L0 0 L0 50 L-45 25 Z" fill="none" stroke="url(#grad1)" stroke-width="2.5" />
  </g>
</svg>
