<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 原子轨道 - 2个椭圆 -->
  <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#22d3ee" stroke-width="1.5" transform="rotate(30 100 100)" />
  <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#a78bfa" stroke-width="1.5" transform="rotate(-30 100 100)" />

  <!-- 中心立方体 - 简约 -->
  <rect x="70" y="70" width="60" height="60" fill="none" stroke="white" stroke-width="2" rx="3" />
  <line x1="100" y1="70" x2="100" y2="130" stroke="white" stroke-width="1.5" />
  <line x1="70" y1="100" x2="130" y2="100" stroke="white" stroke-width="1.5" />

  <!-- 中心点 -->
  <circle cx="100" cy="100" r="3" fill="white" />
</svg>
