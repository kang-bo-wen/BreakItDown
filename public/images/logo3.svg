<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 外圈 - 断裂的环形 -->
  <path d="M100 20 A80 80 0 1 1 60 25" fill="none" stroke="url(#grad3)" stroke-width="2" stroke-linecap="round" />
  <path d="M140 180 A80 80 0 1 1 100 180" fill="none" stroke="url(#grad3)" stroke-width="2" stroke-linecap="round" />

  <!-- 中心立方体 - 正面 -->
  <rect x="65" y="65" width="70" height="70" fill="none" stroke="white" stroke-width="2.5" rx="5" />

  <!-- 立方体对角线 -->
  <line x1="65" y1="65" x2="135" y2="135" stroke="white" stroke-width="1" />
  <line x1="135" y1="65" x2="65" y2="135" stroke="white" stroke-width="1" />

  <!-- 中心点 -->
  <circle cx="100" cy="100" r="5" fill="white" />
</svg>
