<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 环绕电子 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad4a)" stroke-width="1.5" stroke-dasharray="10 5" />
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#grad4b)" stroke-width="1.5" stroke-dasharray="8 4" transform="rotate(45 100 100)" />

  <!-- 中心立方体 -->
  <g transform="translate(100, 100)">
    <!-- 3D立方体 -->
    <path d="M0 -35 L35 -15 L0 5 L-35 -15 Z" fill="none" stroke="white" stroke-width="2" />
    <path d="M35 -15 L35 25 L0 45 L0 5 Z" fill="none" stroke="white" stroke-width="2" />
    <path d="M-35 -15 L0 5 L0 45 L-35 25 Z" fill="none" stroke="white" stroke-width="2" />
  </g>
</svg>
