<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 极简风格 - 点线面 -->

  <!-- 6个环绕点 -->
  <circle cx="100" cy="30" r="4" fill="#22d3ee" />
  <circle cx="160" cy="70" r="4" fill="#a78bfa" />
  <circle cx="160" cy="130" r="4" fill="#f472b6" />
  <circle cx="100" cy="170" r="4" fill="#34d399" />
  <circle cx="40" cy="130" r="4" fill="#fbbf24" />
  <circle cx="40" cy="70" r="4" fill="#f97316" />

  <!-- 连接到中心 -->
  <line x1="100" y1="34" x2="100" y2="70" stroke="#22d3ee" stroke-width="1" />
  <line x1="156" y1="70" x2="120" y2="85" stroke="#a78bfa" stroke-width="1" />
  <line x1="156" y1="130" x2="120" y2="115" stroke="#f472b6" stroke-width="1" />
  <line x1="100" y1="166" x2="100" y2="130" stroke="#34d399" stroke-width="1" />
  <line x1="44" y1="130" x2="80" y2="115" stroke="#fbbf24" stroke-width="1" />
  <line x1="44" y1="70" x2="80" y2="85" stroke="#f97316" stroke-width="1" />

  <!-- 中心立方体 - 极简 -->
  <rect x="70" y="70" width="60" height="60" fill="none" stroke="white" stroke-width="2" rx="2" />
  <line x1="100" y1="70" x2="100" y2="130" stroke="white" stroke-width="1" />
  <line x1="70" y1="100" x2="130" y2="100" stroke="white" stroke-width="1" />

  <!-- 中心点 -->
  <circle cx="100" cy="100" r="5" fill="white" />
</svg>
