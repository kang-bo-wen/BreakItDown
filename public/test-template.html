<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模板系统测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .test-panel {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result h3 {
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result pre {
      background: #2d3748;
      color: #e2e8f0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge.template {
      background: #48bb78;
      color: white;
    }

    .badge.ai {
      background: #4299e1;
      color: white;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .quick-tests {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
    }

    .quick-tests h4 {
      color: #333;
      margin-bottom: 15px;
    }

    .quick-test-btn {
      display: inline-block;
      padding: 8px 16px;
      margin: 5px;
      background: #f0f0f0;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .quick-test-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 模板系统测试</h1>
      <p>测试影子缓存拦截器是否正常工作</p>
    </div>

    <div class="test-panel">
      <div class="input-group">
        <label for="testInput">输入物品名称：</label>
        <input
          type="text"
          id="testInput"
          placeholder="例如：机械键盘、火箭发动机、咖啡机..."
          autocomplete="off"
        />
      </div>

      <button class="btn" id="testBtn">🚀 测试识别</button>

      <div class="quick-tests">
        <h4>快速测试：</h4>
        <span class="quick-test-btn" data-text="机械键盘">机械键盘</span>
        <span class="quick-test-btn" data-text="mechanical keyboard">mechanical keyboard</span>
        <span class="quick-test-btn" data-text="客制化键盘">客制化键盘</span>
        <span class="quick-test-btn" data-text="手机">手机（不应命中）</span>
        <span class="quick-test-btn" data-text="笔记本电脑">笔记本电脑（不应命中）</span>
      </div>

      <div class="result" id="result">
        <h3>
          <span id="resultIcon">📊</span>
          <span id="resultTitle">识别结果</span>
          <span id="resultBadge" class="badge"></span>
        </h3>
        <pre id="resultContent"></pre>
      </div>

      <div class="loading" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在识别中...</p>
      </div>
    </div>
  </div>

  <script>
    const testInput = document.getElementById('testInput');
    const testBtn = document.getElementById('testBtn');
    const result = document.getElementById('result');
    const loading = document.getElementById('loading');
    const resultContent = document.getElementById('resultContent');
    const resultTitle = document.getElementById('resultTitle');
    const resultBadge = document.getElementById('resultBadge');
    const resultIcon = document.getElementById('resultIcon');

    // 快速测试按钮
    document.querySelectorAll('.quick-test-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        testInput.value = btn.dataset.text;
        testInput.focus();
      });
    });

    // 回车键触发测试
    testInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        testBtn.click();
      }
    });

    testBtn.addEventListener('click', async () => {
      const text = testInput.value.trim();

      if (!text) {
        alert('请输入物品名称');
        return;
      }

      // 显示加载状态
      result.classList.remove('show');
      loading.style.display = 'block';
      testBtn.disabled = true;

      try {
        const startTime = Date.now();

        const response = await fetch('/api/identify-text', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ text }),
        });

        const endTime = Date.now();
        const duration = endTime - startTime;

        const data = await response.json();

        // 隐藏加载状态
        loading.style.display = 'none';

        // 显示结果
        result.classList.add('show');

        // 判断是否命中模板
        const isTemplate = data._isTemplate === true;

        if (isTemplate) {
          resultIcon.textContent = '🎯';
          resultTitle.textContent = '命中模板！';
          resultBadge.textContent = '模板数据';
          resultBadge.className = 'badge template';
        } else {
          resultIcon.textContent = '🤖';
          resultTitle.textContent = '真实 AI 识别';
          resultBadge.textContent = 'AI 生成';
          resultBadge.className = 'badge ai';
        }

        // 格式化输出
        const output = {
          识别结果: data,
          响应时间: `${duration}ms`,
          数据来源: isTemplate ? '预设模板' : '真实 AI',
          模板键: data._templateKey || 'N/A'
        };

        resultContent.textContent = JSON.stringify(output, null, 2);

      } catch (error) {
        loading.style.display = 'none';
        result.classList.add('show');
        resultIcon.textContent = '❌';
        resultTitle.textContent = '错误';
        resultBadge.textContent = '失败';
        resultBadge.className = 'badge';
        resultBadge.style.background = '#f56565';
        resultContent.textContent = `错误: ${error.message}`;
      } finally {
        testBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
